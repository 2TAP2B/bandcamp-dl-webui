name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: git.steltner.cloud
  IMAGE: git.steltner.cloud/2tap2b/bandcamp-dl-webui

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends docker.io

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ forgejo.actor }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push
        run: |
          IMAGE="${{ env.IMAGE }}"
          # Always tag :latest on main; also tag the short SHA
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${{ github.ref_name }}"

          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${SHA}" -t "${IMAGE}:${REF}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA}"
          docker push "${IMAGE}:${REF}"
