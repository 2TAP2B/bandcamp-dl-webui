name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker:cli
    services:
      dind:
        image: docker:dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
    env:
      DOCKER_HOST: tcp://dind:2375
    steps:
      - name: Checkout
        run: |
          apk add --no-cache git
          git clone ${{ github.server_url }}/${{ github.repository }} repo
          cd repo
          git checkout ${{ github.sha }}

      - name: Build and push
        run: |
          REF="${{ github.ref }}"
          case "$REF" in
            refs/tags/v*) TAG="${REF#refs/tags/v}" ;;
            *)            TAG="latest" ;;
          esac
          IMAGE=git.steltner.cloud/${{ github.repository }}
          echo "${{ secrets.FORGEJO_TOKEN }}" | \
            docker login git.steltner.cloud -u ${{ github.repository_owner }} --password-stdin
          docker build -t "${IMAGE}:${TAG}" repo/
          docker push "${IMAGE}:${TAG}"