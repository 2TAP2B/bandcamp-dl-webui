name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker:cli
    # No actions/checkout — it uses github.server_url context (= http://server:3000,
    # the internal runner connection URL) which is unreachable from job containers.
    # All $GITHUB_* shell env vars are set correctly by runner.envs.
    steps:
      - name: Checkout
        run: |
          apk add --no-cache git
          git clone "https://git.steltner.cloud/$GITHUB_REPOSITORY" repo
          cd repo && git checkout "$GITHUB_SHA"

      - name: Build and push
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) TAG="${GITHUB_REF#refs/tags/v}" ;;
            *)            TAG="latest" ;;
          esac
          IMAGE="git.steltner.cloud/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "${{ secrets.FORGEJO_TOKEN }}" | \
            docker login git.steltner.cloud -u "$GITHUB_REPOSITORY_OWNER" --password-stdin
          docker build -t "${IMAGE}:${TAG}" repo/
          docker push "${IMAGE}:${TAG}"
