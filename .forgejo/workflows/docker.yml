name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        run: |
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/v}"
          else
            TAG="latest"
          fi
          IMAGE=git.steltner.cloud/${{ github.repository }}
          echo "${{ secrets.FORGEJO_TOKEN }}" | \
            docker login git.steltner.cloud -u ${{ github.repository_owner }} --password-stdin
          docker build -t "${IMAGE}:${TAG}" .
          docker push "${IMAGE}:${TAG}"